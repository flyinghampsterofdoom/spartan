projects:
  - name: Spartan
    environments:
      - name: Production
        services:
          - type: web
            name: spartan-operations
            runtime: node
            plan: starter
            region: oregon
            branch: main
            buildCommand: npm ci --include=dev && npm run build
            preDeployCommand: npm run db:migrate && npm run db:seed
            startCommand: npm start
            healthCheckPath: /login
            autoDeployTrigger: commit
            envVars:
              - key: NODE_ENV
                value: production
              - key: NODE_VERSION
                value: 22.13.0
              - key: DATABASE_URL
                fromDatabase:
                  name: spartan-db
                  property: connectionPoolString
              - key: APP_URL
                value: https://spartan-operations.onrender.com
              - key: SESSION_TTL_HOURS
                value: "12"
              - key: EMAIL_PROVIDER
                value: resend
              - key: EMAIL_FROM
                value: Spartan <no-reply@simplyspartan.com>
              - key: RESEND_API_KEY
                sync: false
              - key: R2_ACCOUNT_ID
                sync: false
              - key: R2_ACCESS_KEY_ID
                sync: false
              - key: R2_SECRET_ACCESS_KEY
                sync: false
              - key: R2_BUCKET_NAME
                sync: false
        databases:
          - name: spartan-db
            plan: basic-256mb
            diskSizeGB: 1
            region: oregon
            postgresMajorVersion: "18"
            databaseName: spartan
            user: spartan
            connectionPool: pgbouncer
            storageAutoscalingEnabled: false
            ipAllowList: []
